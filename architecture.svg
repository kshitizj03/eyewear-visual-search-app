<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1120" viewBox="0 0 960 1120" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <style>
      .layer  { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1.5; rx:14; }
      .lbl    { fill:#64748b; font-size:13px; font-weight:700; letter-spacing:1px; }
      .box    { rx:10; stroke-width:1.5; }
      .ai     { fill:#eef2ff; stroke:#6366f1; }
      .data   { fill:#ecfeff; stroke:#06b6d4; }
      .rank   { fill:#fef3c7; stroke:#f59e0b; }
      .serve  { fill:#dcfce7; stroke:#22c55e; }
      .cli    { fill:#f1f5f9; stroke:#475569; }
      .t      { fill:#0f172a; font-size:14px; font-weight:600; }
      .s      { fill:#475569; font-size:11.5px; }
      .flow   { stroke:#334155; stroke-width:2; fill:none; marker-end:url(#arw); }
      .fb     { stroke:#e11d48; stroke-width:2; fill:none; stroke-dasharray:5 4; marker-end:url(#arw); }
    </style>
  </defs>

  <text x="480" y="34" text-anchor="middle" fill="#0f172a" font-size="22" font-weight="700">Eyewear Visual Search - Architecture</text>
  <text x="480" y="56" text-anchor="middle" fill="#64748b" font-size="13">Image upload → CLIP embedding → FAISS cosine retrieval → multi-attribute fusion ranking</text>

  <!-- CLIENT -->
  <rect x="330" y="78" width="300" height="60" class="box cli"/>
  <text x="480" y="104" text-anchor="middle" class="t">Client - upload image (JPG/PNG)</text>
  <text x="480" y="123" text-anchor="middle" class="s">+ optional text modifier ("tortoise shell")</text>

  <!-- AI INFERENCE LAYER -->
  <rect x="40" y="168" width="880" height="300" class="layer"/>
  <text x="60" y="192" class="lbl">AI INFERENCE LAYER</text>

  <rect x="70" y="210" width="180" height="60" class="box ai"/>
  <text x="160" y="234" text-anchor="middle" class="t">Smart Crop</text>
  <text x="160" y="252" text-anchor="middle" class="s">OpenCV face → frame</text>

  <rect x="290" y="210" width="180" height="60" class="box ai"/>
  <text x="380" y="234" text-anchor="middle" class="t">Colour Correct</text>
  <text x="380" y="252" text-anchor="middle" class="s">gray-world balance</text>

  <rect x="510" y="210" width="180" height="60" class="box ai"/>
  <text x="600" y="234" text-anchor="middle" class="t">CLIP ViT-B/32</text>
  <text x="600" y="252" text-anchor="middle" class="s">encode_image (512-d)</text>

  <rect x="730" y="210" width="160" height="60" class="box ai"/>
  <text x="810" y="234" text-anchor="middle" class="t">CLIP text</text>
  <text x="810" y="252" text-anchor="middle" class="s">encode_text</text>

  <rect x="290" y="330" width="180" height="60" class="box ai"/>
  <text x="380" y="354" text-anchor="middle" class="t">Colour histogram</text>
  <text x="380" y="372" text-anchor="middle" class="s">background-aware HSV</text>

  <rect x="510" y="330" width="180" height="60" class="box ai"/>
  <text x="600" y="354" text-anchor="middle" class="t">Zero-shot tagger</text>
  <text x="600" y="372" text-anchor="middle" class="s">style / rim / material</text>

  <rect x="730" y="330" width="160" height="60" class="box ai"/>
  <text x="810" y="350" text-anchor="middle" class="t">Fuse query</text>
  <text x="810" y="368" text-anchor="middle" class="s">image ⊕ text vec</text>

  <text x="60" y="440" class="s" font-style="italic">Reusable pipeline: the same feature extraction runs for catalog ingestion and live queries.</text>

  <!-- DATA STORAGE LAYER -->
  <rect x="40" y="500" width="880" height="150" class="layer"/>
  <text x="60" y="524" class="lbl">DATA STORAGE LAYER</text>

  <rect x="120" y="540" width="320" height="90" class="box data"/>
  <text x="280" y="572" text-anchor="middle" class="t">FAISS - IndexFlatIP</text>
  <text x="280" y="592" text-anchor="middle" class="s">exact cosine ANN over L2-normalized vectors</text>
  <text x="280" y="610" text-anchor="middle" class="s">→ top-K × 6 candidates</text>

  <rect x="520" y="540" width="320" height="90" class="box data"/>
  <text x="680" y="572" text-anchor="middle" class="t">SQLite</text>
  <text x="680" y="592" text-anchor="middle" class="s">metadata · colour · tags · filters</text>
  <text x="680" y="610" text-anchor="middle" class="s">feedback events + per-style boosts</text>

  <!-- RANKING -->
  <rect x="40" y="682" width="880" height="120" class="layer"/>
  <text x="60" y="706" class="lbl">RANKING</text>

  <rect x="120" y="722" width="300" height="62" class="box rank"/>
  <text x="270" y="746" text-anchor="middle" class="t">Structured filters</text>
  <text x="270" y="765" text-anchor="middle" class="s">price · brand · material</text>

  <rect x="520" y="722" width="320" height="62" class="box rank"/>
  <text x="680" y="744" text-anchor="middle" class="t">Fusion re-rank</text>
  <text x="680" y="763" text-anchor="middle" class="s">0.70·clip + 0.18·colour + 0.12·attr + boost</text>

  <!-- SERVING -->
  <rect x="40" y="834" width="880" height="120" class="layer"/>
  <text x="60" y="858" class="lbl">SERVING</text>

  <rect x="120" y="874" width="300" height="62" class="box serve"/>
  <text x="270" y="898" text-anchor="middle" class="t">FastAPI</text>
  <text x="270" y="917" text-anchor="middle" class="s">/search /feedback /filters · Swagger</text>

  <rect x="520" y="874" width="320" height="62" class="box serve"/>
  <text x="680" y="898" text-anchor="middle" class="t">Streamlit UI</text>
  <text x="680" y="917" text-anchor="middle" class="s">upload · filters · results · 👍/👎</text>

  <!-- RESULT -->
  <rect x="300" y="994" width="360" height="60" class="box cli"/>
  <text x="480" y="1018" text-anchor="middle" class="t">Ranked products + similarity score + tags</text>
  <text x="480" y="1037" text-anchor="middle" class="s">each result shows its clip / colour / attr / boost breakdown</text>

  <!-- FLOW ARROWS -->
  <path class="flow" d="M480,138 L480,168"/>
  <path class="flow" d="M600,270 L600,330"/>
  <path class="flow" d="M600,390 L600,430 L810,430 L810,390"/>
  <path class="flow" d="M280,468 L280,540"/>
  <path class="flow" d="M600,468 L600,486 L680,486 L680,540"/>
  <path class="flow" d="M280,630 L280,722"/>
  <path class="flow" d="M680,630 L680,682"/>
  <path class="flow" d="M420,753 L520,753"/>
  <path class="flow" d="M270,784 L270,874"/>
  <path class="flow" d="M680,802 L680,874"/>
  <path class="flow" d="M420,905 L520,905"/>
  <path class="flow" d="M480,936 L480,994"/>

  <!-- FEEDBACK LOOP -->
  <path class="fb" d="M840,905 L905,905 L905,585 L840,585"/>
  <text x="912" y="748" fill="#e11d48" font-size="11" font-weight="700" transform="rotate(90 912 748)">feedback boosts ranking</text>
</svg>
